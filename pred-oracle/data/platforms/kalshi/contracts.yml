# Kalshi curated contract pick-list. Each pick's `id` is the slug used in
# /gamma/contracts/{id}/ URLs and Task 3's refresh writes the `cached` block
# from the live API. If upstream 404s on refresh, the cached block is left
# intact and `stale: true` plus `stale_reason` are set instead of overwriting.
#
# IMPORTANT: `cached.settlement_entities` is hand-curated. The live Kalshi
# `/markets` API only returns `settlement_source` (a single source identifier)
# and not the full set of regulators / corporations / individuals named in
# resolution criteria. We populate `settlement_entities` manually so heat
# scoring has real entities to match against the Carver corpus. A future
# `--mode=fresh` pull will overwrite the rest of the `cached` block but
# should leave `settlement_entities` alone if non-empty — see Stage 4 polish.

