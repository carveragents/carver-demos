# Resolution context for retrospective narrative:
# - Nov 2023: Binance and CZ pled guilty to BSA violations; DOJ and CFTC
#   were co-litigants. Binance paid $4.3B in penalties (largest US financial
#   crime settlement at the time).
# - Feb 2024: Sentencing postponed to Apr 30, 2024 after DOJ filed 3-year
#   recommendation; defense argued for probation based on cooperation.
# - Market opened at 49% YES (prison) reflecting uncertainty over judicial
#   discretion, then climbed to ~90% as DOJ filings showed severity.
# - Apr 30, 2024: Judge Richard Jones sentenced CZ to 4 months in prison —
#   far below DOJ's 3-year ask but above the defense's zero-prison request.
# - Carver corpus tracked CFTC enforcement orders and DOJ filings through
#   the Nov 2023–Apr 2024 window, capturing the regulatory enforcement
#   posture that informed the severity of the sentencing recommendation.
