# Resolution context for retrospective narrative:
# - Jan 2025: Contract opened at ~10% YES following SEC's historic
#   resistance to altcoin ETFs, despite BTC and ETH ETF precedents.
# - Feb 2025: SEC Crypto Task Force designated under Commissioner Peirce,
#   raising odds of more permissive crypto policy. Market rose to ~70%.
# - Jul 2025: SEC approved in-kind creations/redemptions for crypto ETPs,
#   further boosting optimism. Market peaked near 95%.
# - Sep 2025: SEC approved generic listing standards for commodity-based
#   trust shares, seen as streamlining the altcoin ETF approval path.
# - Oct-Nov 2025: US government shutdown closed the SEC during a critical
#   decision window, stalling multiple pending ETF applications.
# - Dec 31, 2025: Deadline passed without SEC approval. Contract resolved NO.
# - Carver corpus tracked SEC crypto enforcement, Project Crypto speeches,
#   custody guidance, and listing standard changes throughout the year,
#   capturing both the pro-crypto regulatory shift and the shutdown disruption.
