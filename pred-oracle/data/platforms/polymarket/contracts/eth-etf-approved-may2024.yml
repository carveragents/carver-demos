# Resolution context for retrospective narrative:
# - Contract opened Jan 9, 2024 at ~75% YES probability.
# - Market declined steadily Jan–Apr 2024 as SEC delayed and appeared hostile.
# - Crashed to historic low of 5.5% on May 5–6, 2024 after reports that SEC
#   staff had given a negative recommendation to commissioners.
# - SEC commissioners overruled staff and approved eight spot ETH ETF rule
#   changes on May 23, 2024 — price rocketed from ~10% to 99% in one day.
# - The Carver corpus tracked SEC enforcement actions (against crypto fraud,
#   not against legitimate ETF applicants) throughout this window, providing
#   an informational edge during the market's extreme mispricing at 5.5%.
