# Resolution context for retrospective narrative:
# - Jul 2025: Polymarket US contract listed as CFTC event-contract
#   regulation accelerated under Acting Chairman Caroline D. Pham.
# - Aug 2025: CFTC launched "Crypto Sprint" and spot crypto trading initiative,
#   signaling openness to regulated crypto/event-contract markets.
# - Sep 2025: CFTC-SEC joint statements on Project Crypto clarified
#   regulatory coordination for spot crypto asset trading.
# - Nov 25, 2025: Polymarket received CFTC Amended Order of Designation
#   as a DCM. Polymarket filed its US Rulebook amendment the same day.
# - Dec 4, 2025: Acting Chairman Pham announced first-ever listed spot
#   crypto trading on US regulated exchanges.
# - Dec 5, 2025: First real-money trade placed on Polymarket US, resolving
#   the contract YES.
# - Carver corpus tracked the full regulatory arc: CFTC no-action letters
#   on event contracts (Jul-Sep), KalshiEX/ElectronX market maker programs
#   (Nov), CME event contract modifications, and the Polymarket US Rulebook
#   filing itself.
