# Resolution context for retrospective narrative:
# - Contract opened Dec 1, 2023 at 41.5% YES — the market had been burned by
#   prior SEC denials and was skeptical despite Grayscale's Aug 2023 court win.
# - Probability rose rapidly to 72–89% through December as institutional
#   applicants (BlackRock, Fidelity) held meetings with SEC staff.
# - On Jan 9, 2024, the SEC's official X account was hacked; a fake tweet
#   announcing approval briefly spiked Bitcoin price by ~$2K before the SEC
#   clarified no approval had occurred — a signal of how primed the market was.
# - SEC approved eleven spot Bitcoin ETFs on Jan 10, 2024, resolving YES.
# - Carver corpus tracked SEC enforcement actions against crypto fraud throughout
#   Dec 2023–Jan 2024, with no adverse signals toward the pending ETF applicants.
