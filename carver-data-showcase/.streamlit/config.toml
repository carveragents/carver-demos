# Carver brand theme — sampled from carveragents.ai.
# Light, warm off-white surfaces with a lime-green accent (the site's CTA colour),
# charcoal ink, and a legible blue for links (lime would be too low-contrast as a
# link colour). This file is global to the run directory, so it themes BOTH the
# gallery and the internal Data-Quality Cockpit — cosmetic only, no behavioural
# change. Poppins is applied to the gallery via injected CSS in apps/gallery.py.
[theme]
base = "light"
primaryColor = "#bae424"              # lime — active tab, sliders, primary buttons, focus
backgroundColor = "#fbf7f3"           # warm off-white
secondaryBackgroundColor = "#eee8dd"  # sidebar, cards, table headers
textColor = "#1f2124"                 # charcoal ink
linkColor = "#116df8"                 # brand blue — keeps links legible
borderColor = "#e5e8ed"               # soft brand grey
baseRadius = "medium"
